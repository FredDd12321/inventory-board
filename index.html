
<!DOCTYPE html>

<title>FBA 紧急备货看板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e53935;
    --orange: #f4511e;
    --yellow: #f9a825;
    --green: #43a047;
    --blue: #1976d2;
    --bg: #f5f6fa;
    --card: #fff;
    --border: #e0e4ef;
    --text: #2d2d3a;
    --muted: #7b8099;
    --accent: #1976d2;
  }
  body { font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }

  .header { background: linear-gradient(135deg,#1565c0 0%,#1976d2 60%,#42a5f5 100%);
            color: #fff; padding: 20px 28px 16px; display: flex; align-items: center;
            gap: 16px; box-shadow: 0 2px 8px rgba(25,118,210,.3); }
  .header-icon { font-size: 32px; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
  .header-sub { font-size: 12px; opacity: .85; margin-top: 2px; }
  .header-right { margin-left: auto; text-align: right; font-size: 12px; opacity: .85; }

  .stats-bar { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .stat-card { background: var(--card); border-radius: 10px; padding: 12px 20px;
               border: 1px solid var(--border); min-width: 120px; text-align: center;
               box-shadow: 0 1px 4px rgba(0,0,0,.06); cursor: pointer; user-select: none;
               transition: all .2s; }
  .stat-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.12); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: #e3f2fd; box-shadow: 0 2px 12px rgba(25,118,210,.2); }
  .stat-card .num { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-card.red .num { color: var(--red); }
  .stat-card.orange .num { color: var(--orange); }
  .stat-card.blue .num { color: var(--blue); }
  .stat-card.green .num { color: var(--green); }
  .stat-card.yellow .num { color: #b8860b; }
  .stat-card.purple .num { color: #7b1fa2; }

  .controls { display: flex; gap: 10px; padding: 0 24px 16px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; background: var(--card); color: var(--text); outline: none;
    transition: border-color .2s; min-width: 160px;
  }
  .controls input:focus, .controls select:focus { border-color: var(--accent); }
  .sort-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
              background: var(--card); cursor: pointer; font-size: 13px; color: var(--muted);
              transition: all .2s; white-space: nowrap; }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls-label { font-size: 12px; color: var(--muted); margin-right: -4px; }

  .sku-list { padding: 0 24px 32px; display: flex; flex-direction: column; gap: 12px; }
  .sku-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border);
              overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.06);
              transition: box-shadow .2s; }
  .sku-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
  .sku-card.urgent { border-left: 4px solid var(--red); }
  .sku-card.warning { border-left: 4px solid var(--orange); }
  .sku-card.caution { border-left: 4px solid var(--yellow); }

  .sku-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px;
                cursor: pointer; user-select: none; }
  .sku-header:hover { background: #f8f9fd; }
  .sku-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
               text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
  .badge-urgent { background: #fde8e8; color: var(--red); }
  .badge-warning { background: #fde9d9; color: var(--orange); }
  .badge-caution { background: #fff9e6; color: #b8860b; }
  .badge-gap { background: #f3e5f5; color: #7b1fa2; }

  .sku-name { font-size: 14px; font-weight: 600; font-family: monospace; margin-right: 6px; }
  .copy-btn { font-size: 11px; padding: 2px 8px; border: 1px solid var(--border); border-radius: 6px;
              background: #f5f6fa; color: var(--muted); cursor: pointer; transition: all .15s;
              white-space: nowrap; user-select: none; }
  .copy-btn:hover { background: #e3f2fd; color: var(--accent); border-color: #90caf9; }
  .copy-btn.copied { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .sku-store { font-size: 12px; color: var(--muted); background: #f0f2fa;
               padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .sku-trend { font-size: 12px; }
  .trend-up { color: var(--red); }
  .trend-down { color: var(--green); }

  .sku-meta { display: flex; gap: 24px; padding: 0 18px 12px; flex-wrap: wrap; }
  .meta-item { display: flex; flex-direction: column; min-width: 80px; }
  .meta-lbl { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .meta-val { font-size: 14px; font-weight: 600; }
  .meta-val.danger { color: var(--red); }
  .meta-val.warn { color: var(--orange); }
  .meta-val.ok { color: var(--green); }

  .expand-arrow { font-size: 14px; color: var(--muted); transition: transform .2s; margin-left: auto; }
  .sku-card.open .expand-arrow { transform: rotate(180deg); }

  .shipment-detail { display: none; border-top: 1px solid var(--border); padding: 16px 18px; }
  .sku-card.open .shipment-detail { display: block; }
  .detail-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase;
                  letter-spacing: .8px; margin-bottom: 12px; }

  .shipment-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  .shipment-table th { background: #f5f7fb; padding: 8px 12px; text-align: left;
                       font-size: 11px; color: var(--muted); font-weight: 600;
                       text-transform: uppercase; letter-spacing: .5px; }
  .shipment-table td { padding: 9px 12px; border-bottom: 1px solid #f0f2fa; }
  .shipment-table tr:last-child td { border-bottom: none; }
  .shipment-table tr:hover td { background: #fafbff; }

  .rank-badge { display: inline-flex; align-items: center; justify-content: center;
                width: 20px; height: 20px; border-radius: 50%; font-size: 11px;
                font-weight: 700; margin-right: 6px; }
  .rank-1 { background: #fff3cd; color: #856404; }
  .rank-2 { background: #e8eaf6; color: #3949ab; }
  .rank-3 { background: #fce4ec; color: #c62828; }

  .status-chip { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .status-IN_TRANSIT { background: #e3f2fd; color: #1565c0; }
  .status-SHIPPED { background: #e8f5e9; color: #2e7d32; }
  .status-RECEIVING { background: #f3e5f5; color: #7b1fa2; }
  .status-READY_TO_SHIP { background: #e8f5e9; color: #1b5e20; }
  .status-DELIVERED { background: #e8eaf6; color: #283593; }
  .status-CHECKED_IN { background: #e8eaf6; color: #283593; }
  .status-WORKING { background: #fff3e0; color: #e65100; }
  .ready-section { background: #f1f8e9; border: 1px solid #c5e1a5; border-radius: 8px; padding: 12px 14px; margin-top: 12px; }
  .ready-section .detail-title { color: #33691e; margin-bottom: 8px; }
  .ready-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ready-table th { background: #f9fbe7; padding: 6px 10px; text-align: left; font-size: 10px; color: var(--muted); font-weight: 600; }
  .ready-table td { padding: 7px 10px; border-bottom: 1px solid #dcedc8; }
  .ready-table tr:last-child td { border-bottom: none; }
  .ready-summary { margin-top: 8px; font-size: 12px; color: #33691e; }
  .arrived-section { background: #e8eaf6; border: 1px solid #c5cae9; border-radius: 8px; padding: 12px 14px; margin-top: 12px; }
  .arrived-section .detail-title { color: #1a237e; margin-bottom: 8px; }
  .arrived-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .arrived-table th { background: #f5f6fd; padding: 6px 10px; text-align: left; font-size: 10px; color: var(--muted); font-weight: 600; }
  .arrived-table td { padding: 7px 10px; border-bottom: 1px solid #d1d5f0; }
  .arrived-table tr:last-child td { border-bottom: none; }
  .arrived-summary { margin-top: 8px; font-size: 12px; color: #1a237e; }
  .time-icon-wrapper { position: relative; margin-left: 6px; cursor: help; font-style: normal; font-size: 13px; color: #5c6bc0; display: inline-block; vertical-align: middle; }
  .time-icon-wrapper:hover .time-tooltip-box { display: block; }
  .time-tooltip-box { display: none; position: absolute; left: 50%; transform: translateX(-50%); bottom: calc(100% + 8px); background: #1a237e; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 12px; line-height: 1.6; white-space: nowrap; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none; }
  .time-tooltip-box::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #1a237e; }
  .time-tooltip b { color: #90caf9; }

  .arrival-date { font-weight: 600; }
  .arrival-soon { color: var(--red); }
  .arrival-mid  { color: var(--orange); }
  .arrival-far  { color: var(--muted); }
  .arrival-na   { color: #bbb; font-style: italic; }
  .logistics-status-text { font-size: 12px; color: #555; max-width: 200px; display: inline-block; }
  .day-calc { font-size: 11px; color: #1976d2; font-weight: 600; }
  .ff-tag { font-size: 11px; color: #7b1fa2; }

  .transit-summary { display: flex; gap: 20px; padding: 10px 14px; background: #f8f9fd;

  .transit-summary span { color: var(--muted); }
  .transit-summary strong { color: var(--text); }
  .no-transit { color: var(--muted); font-style: italic; font-size: 13px; padding: 8px 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .header { padding: 16px; }
    .stats-bar, .controls, .sku-list { padding-left: 12px; padding-right: 12px; }
    .sku-meta { gap: 14px; }
  }
</style>

const TODAY_STR = RAW_DATA.today;
const TODAY = new Date(TODAY_STR);

function daysDiff(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - TODAY) / 86400000);
}
function arrivalClass(dateStr) {
  const d = daysDiff(dateStr);
  if (d === null) return 'arrival-na';
  if (d <= 14) return 'arrival-soon';
  if (d <= 30) return 'arrival-mid';
  return 'arrival-far';
}
function daysClass(val) {
  if (val == null) return '';
  if (val <= 7) return 'danger';
  if (val <= 15) return 'warn';
  return 'ok';
}
function urgencyLevel(item) {
  const m = Math.min(item.days_e ?? 999, item.days_f ?? 999);
  if (m <= 5) return 'urgent';
  if (m <= 10) return 'warning';
  return 'caution';
}
// 返回所有适用标签的 HTML 字符串（多标签并列，不覆盖）
function urgencyBadgesHTML(item) {

  let badges = '';
  if (lv === 'urgent')  badges += '<span class="sku-badge badge-urgent">🔴 极度紧急</span>';

  if (item.gap_flag)    badges += '<span class="sku-badge badge-gap">⚡衔接不上</span>';

let sortMode = 'days_e', sortAsc = true, filterUrgency = '';

function setSort(mode) {
  sortAsc = sortMode === mode ? !sortAsc : (mode !== 'daily_sales');
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  const m = {days_e:'sort-days-e',days_f:'sort-days-f',daily_sales:'sort-daily',arrival:'sort-arrival'};
  const btn = document.getElementById(m[mode]); if (btn) btn.classList.add('active');
  applyFilter();
}
function sortedData(data) {
  return [...data].sort((a,b) => {
    let va,vb;
    if (sortMode === 'arrival') {
      const f = x => x.top3_shipments?.[0]?.est_arrival || '9999-12-31';
      return sortAsc ? f(a).localeCompare(f(b)) : f(b).localeCompare(f(a));
    }
    const get = k => k === 'days_e' ? 'days_e' : k === 'days_f' ? 'days_f' : 'daily_sales';
    const k = get(sortMode);
    va = a[k] ?? 9999; vb = b[k] ?? 9999;
    return sortAsc ? va - vb : vb - va;
  });
}

function toggleFilter(key) {
  if (filterUrgency === key) filterUrgency = '';

  else filterUrgency = key;
  applyFilter();

function applyFilter() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const store = document.getElementById('store-filter').value;
  let data = RAW_DATA.alert_skus.filter(d => {
    if (store && d.store !== store) return false;
    if (q && !d.sku.toLowerCase().includes(q) && !d.store.toLowerCase().includes(q) && !d.staff.toLowerCase().includes(q)) return false;
    if (filterUrgency === 'urgent' && urgencyLevel(d) !== 'urgent') return false;
    if (filterUrgency === 'warning' && urgencyLevel(d) !== 'warning') return false;
    if (filterUrgency === 'caution' && urgencyLevel(d) !== 'caution') return false;
    if (filterUrgency === 'hasTransit' && d.total_transit_shipments <= 0) return false;
    if (filterUrgency === 'hasReady' && (d.ready_qty||0) <= 0) return false;
    if (filterUrgency === 'noTransit' && (d.total_transit_shipments > 0 || (d.ready_qty||0) > 0)) return false;
    if (filterUrgency === 'gap' && !d.gap_flag) return false;
    return true;

  renderStats(data);

    const ds = item.daily_sales > 0 ? '<span class="day-calc">（' + Math.round(s.qty/item.daily_sales) + '天）</span>' : '';
    const ff = s.freight_forwarder ? '<span class="ff-tag">（' + s.freight_forwarder + '）</span>' : '';
    return `<tr><td><span class="rank-badge ${rc}">${i+1}</span>${s.shipment_id}</td><td><strong>${s.qty}</strong> 件${ds}</td><td class="arrival-date ${ac}">${s.est_arrival ? s.est_arrival+' '+dl : '<span class="arrival-na">暂无日期</span>'}</td><td>${s.channel || '<span style="color:#ccc">—</span>'}${ff}</td><td>${sc}${timeIcon}</td><td>${ls}</td></tr>`;
  }).join('');

  const nm = ships.length === 0 ? '<div class="no-transit">⚠️ 暂无在途/已发货货件，请尽快安排发货</div>' : '';

  return `<div class="sku-card ${lv}" id="card-${idx}">
    <div class="sku-header" onclick="document.getElementById('card-${idx}').classList.toggle('open')">
      ${allBadges}
      <span class="sku-name">${item.sku}</span>
      <button class="copy-btn" id="copy-${idx}" onclick="event.stopPropagation();copySku('${item.sku.replace(/'/g,"\\'")}','copy-${idx}')">复制SKU</button>
      <span class="sku-store">${item.store}</span>
      ${item.staff ? `<span style="font-size:12px;color:var(--muted)">${item.staff}</span>` : ''}
      ${ti ? `<span style="font-size:12px">${ti}</span>` : ''}
      <span class="expand-arrow">▼</span>
    </div>
    <div class="sku-meta">
      <div class="meta-item"><div class="meta-lbl">日销（件/天）</div><div class="meta-val">${item.daily_sales}</div></div>
      <div class="meta-item"><div class="meta-lbl">可售天数（日销）</div><div class="meta-val ${daysClass(item.days_e)}">${item.days_e ?? '—'}</div></div>
      <div class="meta-item"><div class="meta-lbl">可售天数（7天）</div><div class="meta-val ${daysClass(item.days_f)}">${item.days_f ?? '—'}</div></div>
      <div class="meta-item"><div class="meta-lbl">FBA 可售</div><div class="meta-val">${item.fba_avail}</div></div>
      <div class="meta-item"><div class="meta-lbl">预留中</div><div class="meta-val">${item.pending}</div></div>
      <div class="meta-item"><div class="meta-lbl">在途总量</div><div class="meta-val ${item.total_transit_qty > 0 ? 'ok' : 'danger'}">${item.total_transit_qty || 0}</div></div>
      <div class="meta-item"><div class="meta-lbl">在途票数</div><div class="meta-val">${item.total_transit_shipments || 0}</div></div>
      <div class="meta-item"><div class="meta-lbl">后台送达数量</div><div class="meta-val ${(item.arrived_qty||0) > 0 ? 'ok' : ''}">${item.arrived_qty || 0}</div></div>
    </div>
    <div class="shipment-detail">
      <div class="detail-title">最快到达货件（前3票）</div>
      ${ships.length > 0 ? `<table class="shipment-table"><thead><tr><th>货件编号</th><th>在途数量</th><th>预计到达仓库</th><th>渠道</th><th>后台货件状态</th><th>物流最新状态</th></tr></thead><tbody>${sr}</tbody></table>` : ''}
      ${nm}
      <div class="transit-summary">
        <div><span>在途总票数：</span><strong>${item.total_transit_shipments}</strong></div>
        <div><span>在途合计数量：</span><strong>${item.total_transit_qty} 件</strong></div>
        ${item.total_transit_qty > 0 && item.daily_sales > 0 ? `<div><span>在途可支撑约：</span><strong>${Math.round(item.total_transit_qty/item.daily_sales)} 天销量</strong></div>` : ''}
      </div>
      ${renderReady(item)}
      ${renderArrived(item)}
    </div>
  </div>`;
}
function renderReady(item) {
  const rs = item.ready_shipments || [];
  if (!rs.length) return '';
  const rows = rs.map(r => `<tr><td>${r.shipment_id}</td><td><strong>${r.qty}</strong> 件</td><td><span class="status-chip status-READY_TO_SHIP">${statusLabel('READY_TO_SHIP')}</span></td></tr>`).join('');
  const totalQty = rs.reduce((s,r)=>s+r.qty,0);
  return `<div class="ready-section"><div class="detail-title">即将发货货件（READY_TO_SHIP）</div><table class="ready-table"><thead><tr><th>货件编号</th><th>数量</th><th>状态</th></tr></thead><tbody>${rows}</tbody></table><div class="ready-summary">即将发货合计：<strong>${totalQty} 件</strong>（${rs.length} 票）</div></div>`;
}
function renderArrived(item) {
  const rs = item.arrived_shipments || [];
  if (!rs.length) return '';
  const totalQty = rs.reduce((s,r)=>s+r.qty,0);
  const rows = rs.map(r => {
    const tn = r.time_nodes || {};
    // 时间节点tooltip内容
    const tpParts = [];
    const labels = tn.labels || [];
    if (tn.t1 && tn.t1.trim()) tpParts.push(`<div><b>${labels[0] || 'D'}:</b> ${tn.t1}</div>`);
    if (tn.t2 && tn.t2.trim()) tpParts.push(`<div><b>${labels[1] || 'E'}:</b> ${tn.t2}</div>`);
    if (tn.t3 && tn.t3.trim()) tpParts.push(`<div><b>${labels[2] || 'F'}:</b> ${tn.t3}</div>`);
    if (tn.t4 && tn.t4.trim()) tpParts.push(`<div><b>${labels[3] || 'G'}:</b> ${tn.t4}</div>`);
    if (tn.update && tn.update.trim()) tpParts.push(`<div><b>更新时间:</b> ${tn.update}</div>`);
    const hasNodes = tpParts.length > 0;
    const tpHTML = hasNodes
      ? `<div class="time-tooltip">${tpParts.join('')}</div>`
      : '<div class="time-tooltip">暂无时间节点</div>';
    const timeIcon = `<span class="time-icon-wrapper">ⓘ<span class="time-tooltip-box">${tpHTML}</span></span>`;
    const ch = r.channel || '';
    const ff = r.freight_forwarder ? '<span class="ff-tag">（' + r.freight_forwarder + '）</span>' : '';
    return `<tr><td>${r.shipment_id}</td><td><strong>${r.qty}</strong> 件</td><td>${ch || '<span style="color:#ccc">—</span>'}${ff}</td><td><span class="status-chip status-${r.status}">${statusLabel(r.status)}</span>${timeIcon}</td></tr>`;
  }).join('');
  return `<div class="arrived-section"><div class="detail-title">后台送达货件</div><table class="arrived-table"><thead><tr><th>货件编号</th><th>数量</th><th>渠道</th><th>后台货件状态</th></tr></thead><tbody>${rows}</tbody></table><div class="arrived-summary">后台送达合计：<strong>${totalQty} 件</strong>（${rs.length} 票）</div></div>`;
}
function copySku(sku, btnId) {
  navigator.clipboard.writeText(sku).then(() => {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.textContent = '已复制✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制SKU'; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {
    // 兼容无剪贴板权限环境
    const ta = document.createElement('textarea');
    ta.value = sku; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    const btn = document.getElementById(btnId);
    if (btn) { btn.textContent = '已复制✓'; btn.classList.add('copied'); setTimeout(()=>{ btn.textContent='复制SKU'; btn.classList.remove('copied'); },1500); }
  });
}

function getFilteredData() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const store = document.getElementById('store-filter').value;
  return RAW_DATA.alert_skus.filter(d => {
    if (store && d.store !== store) return false;
    if (q && !d.sku.toLowerCase().includes(q) && !d.store.toLowerCase().includes(q) && !d.staff.toLowerCase().includes(q)) return false;
    if (filterUrgency === 'urgent' && urgencyLevel(d) !== 'urgent') return false;
    if (filterUrgency === 'warning' && urgencyLevel(d) !== 'warning') return false;
    if (filterUrgency === 'caution' && urgencyLevel(d) !== 'caution') return false;
    if (filterUrgency === 'hasTransit' && d.total_transit_shipments <= 0) return false;
    if (filterUrgency === 'hasReady' && (d.ready_qty||0) <= 0) return false;
    if (filterUrgency === 'noTransit' && (d.total_transit_shipments > 0 || (d.ready_qty||0) > 0)) return false;
    if (filterUrgency === 'gap' && !d.gap_flag) return false;
    return true;
  });
}
function exportCSV() {
  const data = sortedData(getFilteredData());
  if (!data.length) { alert('当前没有可导出的数据'); return; }
  const H = ['紧急程度','SKU','店铺','运营','日销','日销可售天数','7天可售天数','FBA可售','预留中','在途总量','在途票数','后台送达数量','最快到达(1)','Qty1','预计到达1','距今天数1','渠道1','状态1','最快到达(2)','Qty2','预计到达2','距今天数2','渠道2','状态2','最快到达(3)','Qty3','预计到达3','距今天数3','渠道3','状态3','后台送达(1)','数量(送达1)','后台送达(2)','数量(送达2)','后台送达(3)','数量(送达3)'];
  function e(v) { if (v == null) return ''; const s = String(v); return s.includes(',')||s.includes('"')||s.includes('\n') ? '"'+s.replace(/"/g,'""')+'"' : s; }
  const rows = data.map(d => {
    const lv = urgencyLevel(d);
    const lbMap = {urgent:'极度紧急', warning:'紧急', caution:'需关注'};
    let lb = lbMap[lv] || '';
    if (d.gap_flag) lb += lb ? '/衔接不上' : '衔接不上';
    const s = d.top3_shipments || [], r = d.arrived_shipments || [];
    const p = i => i < s.length ? [s[i].shipment_id, s[i].qty, s[i].est_arrival||'', daysDiff(s[i].est_arrival), s[i].channel||'', s[i].status||''] : ['','','','','',''];
    const pr = i => i < r.length ? [r[i].shipment_id, r[i].qty] : ['',''];
    const [p0,p1,p2] = [p(0),p(1),p(2)], [r0,r1,r2] = [pr(0),pr(1),pr(2)];
    return [lb, e(d.sku), e(d.store), e(d.staff), d.daily_sales, d.days_e??'', d.days_f??'', d.fba_avail, d.pending, d.total_transit_qty, d.total_transit_shipments, d.arrived_qty||0, e(p0[0]), p0[1], p0[2], p0[3]??'', e(p0[4]), p0[5], e(p1[0]), p1[1], p1[2], p1[3]??'', e(p1[4]), p1[5], e(p2[0]), p2[1], p2[2], p2[3]??'', e(p2[4]), p2[5], e(r0[0]), r0[1], e(r1[0]), r1[1], e(r2[0]), r2[1]];
  });
  const csv = '\uFEFF' + H.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
  const b = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href = u; a.download = 'FBA_备货预警_'+TODAY_STR.slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(u);
}
document.getElementById('today-date').textContent = '数据日期：' + TODAY_STR;
window.onload = () => { initStores(); applyFilter(); setTimeout(() => { [0,1,2].forEach(i => { const c = document.getElementById('card-'+i); if (c) c.classList.add('open'); }); }, 100); };
</script>
